<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#1a1a2e" rx="12"/>
  <text x="400" y="30" fill="#fff" font-size="18" font-family="sans-serif" text-anchor="middle" font-weight="bold">Формирование памяти: от кратковременной к долговременной</text>
  
  <!-- Stage 1: Sensory -->
  <rect x="30" y="55" width="160" height="200" fill="#1e3a5f" rx="10" stroke="#3498db" stroke-width="1.5"/>
  <text x="110" y="80" fill="#3498db" font-size="13" font-family="sans-serif" text-anchor="middle" font-weight="bold">Сенсорная</text>
  <text x="110" y="96" fill="#3498db" font-size="13" font-family="sans-serif" text-anchor="middle" font-weight="bold">память</text>
  <text x="110" y="120" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">~0.2 — 3 сек</text>
  <rect x="45" y="135" width="130" height="35" fill="#2471a3" rx="5" opacity="0.5"/>
  <text x="110" y="157" fill="#fff" font-size="10" font-family="sans-serif" text-anchor="middle">Иконическая (зрение)</text>
  <rect x="45" y="180" width="130" height="35" fill="#2471a3" rx="5" opacity="0.5"/>
  <text x="110" y="202" fill="#fff" font-size="10" font-family="sans-serif" text-anchor="middle">Эхоическая (слух)</text>
  <text x="110" y="240" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle">Высокая ёмкость, быстрое</text>
  <text x="110" y="252" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle">затухание</text>
  
  <!-- Arrow 1→2 -->
  <line x1="195" y1="155" x2="230" y2="155" stroke="#f39c12" stroke-width="3"/>
  <polygon points="228,148 245,155 228,162" fill="#f39c12"/>
  <text x="220" y="130" fill="#f39c12" font-size="9" font-family="sans-serif">Внимание</text>
  
  <!-- Stage 2: Short-term / Working -->
  <rect x="245" y="55" width="160" height="200" fill="#2c2010" rx="10" stroke="#f39c12" stroke-width="1.5"/>
  <text x="325" y="80" fill="#f39c12" font-size="13" font-family="sans-serif" text-anchor="middle" font-weight="bold">Кратковременная</text>
  <text x="325" y="96" fill="#f39c12" font-size="13" font-family="sans-serif" text-anchor="middle" font-weight="bold">/ рабочая</text>
  <text x="325" y="120" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">~15 — 30 сек, 7±2 элементов</text>
  <rect x="260" y="135" width="130" height="35" fill="#d4940a" rx="5" opacity="0.3"/>
  <text x="325" y="157" fill="#fff" font-size="10" font-family="sans-serif" text-anchor="middle">Фонетическая петля</text>
  <rect x="260" y="180" width="130" height="35" fill="#d4940a" rx="5" opacity="0.3"/>
  <text x="325" y="202" fill="#fff" font-size="10" font-family="sans-serif" text-anchor="middle">Визуально-пространств.</text>
  <text x="325" y="240" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle">Префронтальная кора</text>
  <text x="325" y="252" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle">+ теменная доля</text>
  
  <!-- Arrow 2→3 -->
  <line x1="410" y1="155" x2="445" y2="155" stroke="#2ecc71" stroke-width="3"/>
  <polygon points="443,148 460,155 443,162" fill="#2ecc71"/>
  <text x="430" y="130" fill="#2ecc71" font-size="9" font-family="sans-serif">Повторение</text>
  <text x="430" y="140" fill="#2ecc71" font-size="9" font-family="sans-serif">+ эмоции</text>
  
  <!-- Stage 3: Long-term -->
  <rect x="460" y="55" width="160" height="200" fill="#0f2c1a" rx="10" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="540" y="80" fill="#2ecc71" font-size="13" font-family="sans-serif" text-anchor="middle" font-weight="bold">Долговременная</text>
  <text x="540" y="96" fill="#2ecc71" font-size="13" font-family="sans-serif" text-anchor="middle" font-weight="bold">память</text>
  <text x="540" y="120" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Часы → вся жизнь</text>
  <rect x="475" y="135" width="130" height="25" fill="#1a8c4e" rx="5" opacity="0.3"/>
  <text x="540" y="152" fill="#fff" font-size="10" font-family="sans-serif" text-anchor="middle">Декларативная</text>
  <text x="540" y="178" fill="#999" font-size="9" font-family="sans-serif" text-anchor="middle">Эпизодическая (события)</text>
  <text x="540" y="190" fill="#999" font-size="9" font-family="sans-serif" text-anchor="middle">Семантическая (факты)</text>
  <rect x="475" y="200" width="130" height="25" fill="#1a8c4e" rx="5" opacity="0.3"/>
  <text x="540" y="217" fill="#fff" font-size="10" font-family="sans-serif" text-anchor="middle">Процедурная</text>
  <text x="540" y="240" fill="#999" font-size="9" font-family="sans-serif" text-anchor="middle">Навыки, привычки</text>
  <text x="540" y="252" fill="#999" font-size="9" font-family="sans-serif" text-anchor="middle">(базальные ганглии)</text>
  
  <!-- LTP section below -->
  <rect x="50" y="290" width="700" height="130" fill="#16213e" rx="10"/>
  <text x="400" y="315" fill="#e74c3c" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="bold">Долговременная потенциация (LTP) — клеточный механизм памяти</text>
  
  <!-- Before LTP -->
  <text x="180" y="340" fill="#aaa" font-size="11" font-family="sans-serif" text-anchor="middle">До LTP</text>
  <line x1="120" y1="360" x2="180" y2="360" stroke="#4a90d9" stroke-width="2"/>
  <circle cx="200" cy="360" r="20" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
  <text x="200" y="363" fill="#2ecc71" font-size="8" font-family="sans-serif" text-anchor="middle">R</text>
  <text x="180" y="395" fill="#666" font-size="9" font-family="sans-serif" text-anchor="middle">Мало рецепторов</text>
  <text x="180" y="407" fill="#666" font-size="9" font-family="sans-serif" text-anchor="middle">Слабый сигнал</text>
  
  <!-- After LTP -->
  <text x="440" y="340" fill="#aaa" font-size="11" font-family="sans-serif" text-anchor="middle">После LTP</text>
  <line x1="380" y1="360" x2="440" y2="360" stroke="#4a90d9" stroke-width="4"/>
  <circle cx="460" cy="360" r="20" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
  <text x="460" y="363" fill="#2ecc71" font-size="8" font-family="sans-serif" text-anchor="middle">R</text>
  <circle cx="460" cy="340" r="5" fill="#2ecc71"/>
  <circle cx="475" cy="350" r="5" fill="#2ecc71"/>
  <circle cx="445" cy="350" r="5" fill="#2ecc71"/>
  <text x="440" y="395" fill="#2ecc71" font-size="9" font-family="sans-serif" text-anchor="middle">Больше рецепторов</text>
  <text x="440" y="407" fill="#2ecc71" font-size="9" font-family="sans-serif" text-anchor="middle">Сильный сигнал!</text>
  
  <!-- Arrow between -->
  <line x1="260" y1="370" x2="350" y2="370" stroke="#e74c3c" stroke-width="2" marker-end="url(#a1)"/>
  <text x="305" y="365" fill="#e74c3c" font-size="9" font-family="sans-serif" text-anchor="middle">Повторная</text>
  <text x="305" y="377" fill="#e74c3c" font-size="9" font-family="sans-serif" text-anchor="middle">стимуляция</text>
  
  <!-- Key brain areas -->
  <rect x="630" y="340" width="110" height="70" fill="#0f1a2c" rx="5"/>
  <text x="685" y="358" fill="#fff" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Ключевые зоны</text>
  <text x="685" y="375" fill="#f39c12" font-size="9" font-family="sans-serif" text-anchor="middle">Гиппокамп</text>
  <text x="685" y="388" fill="#f39c12" font-size="9" font-family="sans-serif" text-anchor="middle">Миндалина</text>
  <text x="685" y="401" fill="#f39c12" font-size="9" font-family="sans-serif" text-anchor="middle">Префронт. кора</text>
  
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Bottom note -->
  <text x="400" y="450" fill="#888" font-size="11" font-family="sans-serif" text-anchor="middle">Консолидация памяти: гиппокамп → (во время сна) → неокортекс (долговременное хранение)</text>
  <text x="400" y="470" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Нейрогенез: новые нейроны образуются в гиппокампе даже у взрослых (dentate gyrus)</text>
  
  <!-- Sleep consolidation -->
  <rect x="200" y="485" width="400" height="50" fill="#1a1a3e" rx="8" stroke="#9b59b6" stroke-width="1"/>
  <text x="400" y="507" fill="#9b59b6" font-size="11" font-family="sans-serif" text-anchor="middle">Сон (медленноволновая фаза) — критичен для переноса памяти</text>
  <text x="400" y="523" fill="#7b68a8" font-size="10" font-family="sans-serif" text-anchor="middle">из гиппокампа в неокортекс. Недосып = ухудшение обучения.</text>
</svg>