<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="100%" style="stop-color:#c9a96e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#1a1a2e" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="35" fill="#fff" font-size="18" font-family="sans-serif" text-anchor="middle" font-weight="bold">Строение нейрона</text>
  
  <!-- Axon terminals (right) -->
  <g>
    <line x1="620" y1="250" x2="720" y2="180" stroke="#4a90d9" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="620" y1="250" x2="720" y2="250" stroke="#4a90d9" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="620" y1="250" x2="720" y2="320" stroke="#4a90d9" stroke-width="3" marker-end="url(#arrow)"/>
    <circle cx="730" cy="180" r="8" fill="#e74c3c" opacity="0.8"/>
    <circle cx="730" cy="250" r="8" fill="#e74c3c" opacity="0.8"/>
    <circle cx="730" cy="320" r="8" fill="#e74c3c" opacity="0.8"/>
  </g>
  
  <!-- Axon -->
  <line x1="480" y1="250" x2="620" y2="250" stroke="#4a90d9" stroke-width="5"/>
  <!-- Myelin sheath -->
  <ellipse cx="520" cy="250" rx="20" ry="14" fill="none" stroke="#9b59b6" stroke-width="2"/>
  <ellipse cx="560" cy="250" rx="20" ry="14" fill="none" stroke="#9b59b6" stroke-width="2"/>
  <ellipse cx="600" cy="250" rx="20" ry="14" fill="none" stroke="#9b59b6" stroke-width="2"/>
  
  <!-- Cell body (soma) -->
  <ellipse cx="420" cy="250" rx="70" ry="60" fill="url(#cellGrad)" stroke="#b8860b" stroke-width="2"/>
  <!-- Nucleus -->
  <ellipse cx="420" cy="250" rx="30" ry="25" fill="#5d4e37" stroke="#3e3226" stroke-width="1.5"/>
  <text x="420" y="255" fill="#e8d5b7" font-size="10" font-family="sans-serif" text-anchor="middle">ядро</text>
  
  <!-- Dendrites (left) -->
  <g stroke="#e67e22" stroke-width="2.5" fill="none">
    <path d="M350,230 C300,200 280,160 250,140"/>
    <path d="M350,220 C310,180 290,120 260,100"/>
    <path d="M350,240 C290,230 260,200 230,190"/>
    <path d="M350,260 C290,280 260,310 230,330"/>
    <path d="M350,270 C300,310 280,350 250,370"/>
    <path d="M350,280 C310,330 300,380 280,400"/>
  </g>
  
  <!-- Synaptic boutons on dendrites -->
  <circle cx="248" cy="138" r="5" fill="#2ecc71"/>
  <circle cx="258" cy="98" r="5" fill="#2ecc71"/>
  <circle cx="228" cy="188" r="5" fill="#2ecc71"/>
  <circle cx="228" cy="332" r="5" fill="#2ecc71"/>
  <circle cx="248" cy="372" r="5" fill="#2ecc71"/>
  <circle cx="278" cy="402" r="5" fill="#2ecc71"/>
  
  <!-- Labels -->
  <text x="230" y="85" fill="#e67e22" font-size="13" font-family="sans-serif" text-anchor="end">Дендриты</text>
  <line x1="232" y1="83" x2="255" y2="95" stroke="#e67e22" stroke-width="1" stroke-dasharray="3"/>
  
  <text x="420" y="330" fill="#c9a96e" font-size="13" font-family="sans-serif" text-anchor="middle">Тело клетки (сома)</text>
  
  <text x="540" y="225" fill="#4a90d9" font-size="13" font-family="sans-serif" text-anchor="middle">Аксон</text>
  
  <text x="555" y="280" fill="#9b59b6" font-size="11" font-family="sans-serif" text-anchor="middle">Миелиновая оболочка</text>
  
  <text x="740" y="170" fill="#e74c3c" font-size="11" font-family="sans-serif">Терминали</text>
  <text x="740" y="345" fill="#e74c3c" font-size="11" font-family="sans-serif">(синапсы)</text>
  
  <text x="200" y="140" fill="#2ecc71" font-size="10" font-family="sans-serif" text-anchor="end">Синаптические</text>
  <text x="200" y="152" fill="#2ecc71" font-size="10" font-family="sans-serif" text-anchor="end">входы</text>
  
  <!-- Direction arrow -->
  <text x="400" y="460" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Направление сигнала: дендриты → сома → аксон → терминали</text>
  <line x1="250" y1="470" x2="550" y2="470" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>