<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <rect width="900" height="650" fill="#1a1a2e" rx="12"/>
  <text x="450" y="30" fill="#fff" font-size="18" font-family="sans-serif" text-anchor="middle" font-weight="bold">Большие языковые модели (LLM) vs Человеческий мозг</text>
  
  <!-- Architecture comparison -->
  <text x="225" y="60" fill="#2ecc71" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="bold">Человеческий мозг</text>
  <text x="675" y="60" fill="#e74c3c" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="bold">LLM (GPT-4 class)</text>
  
  <!-- Brain side -->
  <rect x="30" y="75" width="390" height="200" fill="#1e2a3a" rx="10"/>
  <text x="225" y="100" fill="#2ecc71" font-size="12" font-family="sans-serif" text-anchor="middle">Архитектура</text>
  
  <text x="50" y="125" fill="#aaa" font-size="10" font-family="sans-serif">• 86 млрд нейронов, ~100 трлн синапсов</text>
  <text x="50" y="142" fill="#aaa" font-size="10" font-family="sans-serif">• Специализированные зоны (зрение, речь, моторика)</text>
  <text x="50" y="159" fill="#aaa" font-size="10" font-family="sans-serif">• Рекуррентные связи, обратная связь повсюду</text>
  <text x="50" y="176" fill="#aaa" font-size="10" font-family="sans-serif">• Нейромодуляторы (дофамин, серотонин) — глобальный контекст</text>
  <text x="50" y="193" fill="#aaa" font-size="10" font-family="sans-serif">• Непрерывное обучение, без эпох</text>
  <text x="50" y="210" fill="#aaa" font-size="10" font-family="sans-serif">• Аналоговые сигналы (частотный код, 1-200 Гц)</text>
  <text x="50" y="227" fill="#aaa" font-size="10" font-family="sans-serif">• Энергопотребление: ~20 Вт</text>
  <text x="50" y="244" fill="#aaa" font-size="10" font-family="sans-serif">• Размер: ~1.4 кг, нейрохимическая основа</text>
  <text x="50" y="261" fill="#aaa" font-size="10" font-family="sans-serif">• Оптимизация: эволюция (~600 млн лет)</text>
  
  <!-- LLM side -->
  <rect x="480" y="75" width="390" height="200" fill="#2a1e2a" rx="10"/>
  <text x="675" y="100" fill="#e74c3c" font-size="12" font-family="sans-serif" text-anchor="middle">Архитектура</text>
  
  <text x="500" y="125" fill="#aaa" font-size="10" font-family="sans-serif">• ~1.8 трлн параметров (GPT-4 оценка)</text>
  <text x="500" y="142" fill="#aaa" font-size="10" font-family="sans-serif">• Однородные слои Transformer (self-attention)</text>
  <text x="500" y="159" fill="#aaa" font-size="10" font-family="sans-serif">• Однонаправленная (авторегрессия) + attention</text>
  <text x="500" y="176" fill="#aaa" font-size="10" font-family="sans-serif">• Positional encoding заменяет «порядок»</text>
  <text x="500" y="193" fill="#aaa" font-size="10" font-family="sans-serif">• Обучение один раз, затем inference (без дообучения)</text>
  <text x="500" y="210" fill="#aaa" font-size="10" font-family="sans-serif">• Цифровые данные (float16/bfloat16)</text>
  <text x="500" y="227" fill="#aaa" font-size="10" font-family="sans-serif">• Энергопотребление: ~100+ МВт·ч на обучение</text>
  <text x="500" y="244" fill="#aaa" font-size="10" font-family="sans-serif">• Размер: кластер GPU, кремниевая основа</text>
  <text x="500" y="261" fill="#aaa" font-size="10" font-family="sans-serif">• Оптимизация: градиентный спуск (~10 лет развития)</text>
  
  <!-- Comparison table -->
  <rect x="30" y="290" width="840" height="340" fill="#16213e" rx="10"/>
  <text x="450" y="315" fill="#fff" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="bold">Сравнение по ключевым параметрам</text>
  
  <!-- Table header -->
  <rect x="50" y="325" width="220" height="25" fill="#2c3e50" rx="3"/>
  <text x="160" y="342" fill="#fff" font-size="11" font-family="sans-serif" text-anchor="middle">Параметр</text>
  <rect x="275" y="325" width="280" height="25" fill="#1a3c2a" rx="3"/>
  <text x="415" y="342" fill="#2ecc71" font-size="11" font-family="sans-serif" text-anchor="middle">Мозг</text>
  <rect x="560" y="325" width="280" height="25" fill="#3c1a1a" rx="3"/>
  <text x="700" y="342" fill="#e74c3c" font-size="11" font-family="sans-serif" text-anchor="middle">LLM</text>
  
  <!-- Rows -->
  <text x="160" y="372" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Обучение</text>
  <text x="415" y="372" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Непрерывное, few-shot (1-2 примера)</text>
  <text x="700" y="372" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Предобучение + fine-tune, нужен корпус</text>
  
  <text x="160" y="395" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Память</text>
  <text x="415" y="395" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Эпизодическая + рабочая + долговрем.</text>
  <text x="700" y="395" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Только в весах + context window</text>
  
  <text x="160" y="418" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Рассуждение</text>
  <text x="415" y="418" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Каузальное, абстрактное, с интуицией</text>
  <text x="700" y="418" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Паттерн-матчинг, имитация рассуждения</text>
  
  <text x="160" y="441" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Энергоэффективность</text>
  <text x="415" y="441" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">~20 Вт (весь мозг)</text>
  <text x="700" y="441" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">~100 МВт·ч обучение + кВт·ч/запрос</text>
  
  <text x="160" y="464" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Скорость сигнала</text>
  <text x="415" y="464" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">~120 м/с (миелиновые волокна)</text>
  <text x="700" y="464" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">~0.66 × скорость света (электрич.)</text>
  
  <text x="160" y="487" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Тип вычислений</text>
  <text x="415" y="487" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Асинхронный, разреженный, вероятностный</text>
  <text x="700" y="487" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Синхронный, матричный, детерминированный</text>
  
  <text x="160" y="510" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Топология</text>
  <text x="415" y="510" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Small-world сети, модульная, иерархическая</text>
  <text x="700" y="510" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Слоистая, однородная (Transformer blocks)</text>
  
  <text x="160" y="533" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Обобщение</text>
  <text x="415" y="533" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Выдающееся: OOD, мало данных, трансфер</text>
  <text x="700" y="533" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Хорошее в домене, слабое OOD, галлюцинации</text>
  
  <text x="160" y="556" fill="#f1c40f" font-size="10" font-family="sans-serif" text-anchor="middle">Сознание</text>
  <text x="415" y="556" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Да (по крайней мере у хозяина доклада)</text>
  <text x="700" y="556" fill="#ccc" font-size="10" font-family="sans-serif" text-anchor="middle">Нет (философский зомби)</text>
  
  <!-- Bottom note -->
  <text x="450" y="590" fill="#9b59b6" font-size="11" font-family="sans-serif" text-anchor="middle">Парадокс: мозг медленнее на уровне отдельного нейрона, но параллельность и архитектура</text>
  <text x="450" y="608" fill="#9b59b6" font-size="11" font-family="sans-serif" text-anchor="middle">дают ему эффективность, недостижимую для современных ИИ-систем.</text>
  <text x="450" y="630" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Направление исследований: spiking neural networks (SNN), нейроморфные чипы (Intel Loihi, IBM TrueNorth)</text>
</svg>