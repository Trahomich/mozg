<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1a1a2e" rx="12"/>
  <text x="400" y="35" fill="#fff" font-size="18" font-family="sans-serif" text-anchor="middle" font-weight="bold">Синаптическая передача</text>
  
  <!-- Presynaptic neuron (top) -->
  <ellipse cx="400" cy="120" rx="150" ry="50" fill="#2c3e50" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="115" fill="#fff" font-size="13" font-family="sans-serif" text-anchor="middle">Пресинаптический</text>
  <text x="400" y="132" fill="#fff" font-size="13" font-family="sans-serif" text-anchor="middle">нейрон</text>
  
  <!-- Synaptic vesicles -->
  <circle cx="330" cy="155" r="10" fill="#e74c3c" opacity="0.7"/>
  <circle cx="360" cy="160" r="10" fill="#e74c3c" opacity="0.7"/>
  <circle cx="390" cy="152" r="10" fill="#e74c3c" opacity="0.7"/>
  <circle cx="420" cy="158" r="10" fill="#e74c3c" opacity="0.7"/>
  <circle cx="450" cy="153" r="10" fill="#e74c3c" opacity="0.7"/>
  <text x="400" y="163" fill="#e74c3c" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">везикулы</text>
  
  <!-- Synaptic cleft -->
  <rect x="250" y="180" width="300" height="60" fill="#1e3a5f" opacity="0.5" rx="5"/>
  <text x="400" y="215" fill="#7fb3d8" font-size="13" font-family="sans-serif" text-anchor="middle">Синаптическая щель</text>
  
  <!-- Neurotransmitter molecules -->
  <circle cx="310" cy="200" r="5" fill="#f1c40f"/>
  <circle cx="340" cy="195" r="5" fill="#f1c40f"/>
  <circle cx="370" cy="205" r="5" fill="#f1c40f"/>
  <circle cx="400" cy="198" r="5" fill="#f1c40f"/>
  <circle cx="430" cy="202" r="5" fill="#f1c40f"/>
  <circle cx="460" cy="196" r="5" fill="#f1c40f"/>
  <circle cx="490" cy="204" r="5" fill="#f1c40f"/>
  
  <!-- Arrows showing release -->
  <line x1="360" y1="168" x2="350" y2="188" stroke="#f1c40f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="165" x2="400" y2="188" stroke="#f1c40f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="167" x2="450" y2="188" stroke="#f1c40f" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Postsynaptic neuron (bottom) -->
  <ellipse cx="400" cy="320" rx="150" ry="50" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
  <text x="400" y="315" fill="#fff" font-size="13" font-family="sans-serif" text-anchor="middle">Постсинаптический</text>
  <text x="400" y="332" fill="#fff" font-size="13" font-family="sans-serif" text-anchor="middle">нейрон</text>
  
  <!-- Receptors -->
  <rect x="310" y="252" width="12" height="20" rx="3" fill="#2ecc71"/>
  <rect x="340" y="250" width="12" height="22" rx="3" fill="#2ecc71"/>
  <rect x="370" y="252" width="12" height="20" rx="3" fill="#2ecc71"/>
  <rect x="400" y="250" width="12" height="22" rx="3" fill="#2ecc71"/>
  <rect x="430" y="252" width="12" height="20" rx="3" fill="#2ecc71"/>
  <rect x="460" y="250" width="12" height="22" rx="3" fill="#2ecc71"/>
  <rect x="490" y="252" width="12" height="20" rx="3" fill="#2ecc71"/>
  <text x="400" y="285" fill="#2ecc71" font-size="10" font-family="sans-serif" text-anchor="middle">Рецепторы</text>
  
  <!-- Legend -->
  <rect x="50" y="380" width="700" height="55" fill="#16213e" rx="8"/>
  <circle cx="90" cy="407" r="8" fill="#e74c3c" opacity="0.7"/>
  <text x="105" y="412" fill="#ccc" font-size="11" font-family="sans-serif">Везикулы с нейромедиатором</text>
  <circle cx="310" cy="407" r="6" fill="#f1c40f"/>
  <text x="322" y="412" fill="#ccc" font-size="11" font-family="sans-serif">Молекулы нейромедиатора</text>
  <rect x="520" y="400" width="10" height="14" rx="2" fill="#2ecc71"/>
  <text x="537" y="412" fill="#ccc" font-size="11" font-family="sans-serif">Рецепторы</text>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f1c40f"/>
    </marker>
  </defs>
</svg>